version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: Gods-Eye_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-Gods-Eye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Gods-Eye_secure}
      POSTGRES_DB: ${POSTGRES_DB:-Gods-Eye_os}
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5.11.0
    container_name: Gods-Eye_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-Gods-Eye_secure_graph}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    env_file: .env
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: Gods-Eye_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

